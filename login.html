<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AppraisePro</title>
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Appraise<span>Pro</span></div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index1.html">Dashboard</a>
      <a href="#">Activity</a>
      <a href="#">Projects</a>
      <a href="login.html" class="signin-btn">Sign In</a>
    </nav>
    <div class="menu-toggle" id="mobile-menu">&#9776;</div>
  </header>

  <!-- Login Section -->
  <section class="login-section">
    <div class="login-box">
      <h2>Welcome Back 👋</h2>
      <p>Sign in to continue to AppraisePro</p>
      <form id="loginForm">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <p class="signup-text">Don’t have an account? <a href="#">Register here</a></p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2025 AppraisePro. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
  <script>
    // Simple login action
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if (user === "admin" && pass === "1234") {
        alert("Login successful!");
        window.location.href = "index1.html"; // Redirect to dashboard
      } else {
        alert("Invalid username or password.");
      }
    });
  </script>
</body>
</html>
